version: 2

models:
  - name: mart_delivery_performance
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_date, order_status]
    columns:
      - name: order_date
        tests: [not_null]
      - name: order_status
        tests: [not_null]
      - name: order_count
        tests: [not_null]
