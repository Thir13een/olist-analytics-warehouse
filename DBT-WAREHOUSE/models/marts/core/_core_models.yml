version: 2

models:
  - name: fct_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        tests: [not_null]
      - name: order_value
        tests: [not_null]
      - name: has_order_items
        tests: [not_null]
      - name: has_payment
        tests: [not_null]
      - name: has_review
        tests: [not_null]

  - name: fct_order_items
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id, order_item_id]
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: price
        tests: [not_null]
      - name: freight_value
        tests: [not_null]

  - name: dim_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: city
        tests: [not_null]
      - name: state
        tests: [not_null]

  - name: dim_products
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: dim_sellers
    columns:
      - name: seller_id
        tests: [unique, not_null]
      - name: city
        tests: [not_null]
      - name: state
        tests: [not_null]

  - name: dim_dates
    columns:
      - name: date_day
        tests: [unique, not_null]

  - name: dim_geolocation
    columns:
      - name: zip_code_prefix
        tests: [unique, not_null]
