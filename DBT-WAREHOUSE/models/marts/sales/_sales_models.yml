version: 2

models:
  - name: mart_sales_overview
    columns:
      - name: order_date
        tests: [unique, not_null]
      - name: order_count
        tests: [not_null]
      - name: total_order_value
        tests: [not_null]
      - name: total_payment_value
        tests: [not_null]

  - name: mart_product_performance
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: order_item_count
        tests: [not_null]
      - name: total_sales_value
        tests: [not_null]

  - name: mart_geographic_performance
    columns:
      - name: zip_code_prefix
        tests: [not_null]
      - name: customer_count
        tests: [not_null]
      - name: order_count
        tests: [not_null]
