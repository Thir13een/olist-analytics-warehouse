version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: zip_code_prefix
        tests: [not_null]

  - name: stg_sellers
    columns:
      - name: seller_id
        tests: [unique, not_null]
      - name: zip_code_prefix
        tests: [not_null]

  - name: stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["delivered", "shipped", "canceled", "unavailable", "invoiced", "processing", "created", "approved"]

  - name: stg_order_items
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id, order_item_id]
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_sellers')
                field: seller_id

  - name: stg_products
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_payments
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_sequential
        tests: [not_null]
      - name: payment_type
        tests: [not_null]
      - name: payment_value
        tests: [not_null]

  - name: stg_reviews
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false

  - name: stg_geolocation
    columns:
      - name: zip_code_prefix
        tests: [unique, not_null]

  - name: stg_product_category_translation
    columns:
      - name: product_category_name
        tests: [unique, not_null]
      - name: product_category_name_en
        tests: [not_null]
